<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Contato - NextGen</title>
</head>

<body>

    <header>
        <h1>NextGen Soluções Tecnológicas</h1>
        <nav>
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="servicos.html">Serviços</a>
            <a class="nav-link" href="contato.html">Contato</a>
        </nav>
    </header>

    <main id="contato-container">
        <h2>Fale Conosco</h2>
        <p class="texto-explicativo">
            A NextGen é especialista em suporte técnico e arquitetura de redes.
            Preencha o formulário abaixo para solicitar um orçamento ou tirar dúvidas sobre nossa rota tecnológica.
        </p>

        <div class="caixa-formulario">
            <form action="index.html">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="servicos">Escolha o serviço:</label>
                <select name="servicos" id="servicos" required>
                    <option value="">Selecione...</option>
                    <option value="Suporte">Suporte</option>
                    <option value="Projeto de Rede">Projeto de Rede</option>
                    <option value="Consultoria tech">Consultoria tech</option>
                </select>

                <label for="mensagem">Sua Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="4" required></textarea>

                <div class="botoes">
                    <input type="submit" value="Enviar">
                    <input type="reset" value="Limpar">
                </div>
            </form>
        </div>
    </main>

</body>

</html>
